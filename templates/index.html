<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
    <nav class="bg-blue-600 text-white p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">{{ app_name }}</h1>
            <a href="{{ url_for('auth.logout') }}" class="hover:underline">Cerrar Sesión</a>
        </div>
    </nav>

    <div class="container mx-auto p-8">
        <h2 class="text-3xl font-bold mb-4">Bienvenido</h2>
        <p class="text-gray-600">Versión: {{ app_version }}</p>

        <div class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white p-6 rounded shadow">
                <h3 class="font-bold text-lg">Dashboard</h3>
                <a href="{{ url_for('dashboard') }}" class="text-blue-500 hover:underline">Ir al panel</a>
            </div>
        </div>
    </div>
</body>

</html>
